name: Platform Job Tests (PR)

on:
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-job-tests-pr.yml"

jobs:
  test-job-schedulers:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run scheduler integration tests
        run: >
          mvn -f platform/pom.xml
          -Dtest=AppointmentReminderJobIntegrationTest,RetentionMetricsJobIntegrationTest
          -DfailIfNoTests=false
          test
