name: Platform Deploy (Railway)

on:
  workflow_dispatch:
    inputs:
      railway_service:
        description: Optional Railway service override
        required: false
        type: string
      railway_environment:
        description: Optional Railway environment override
        required: false
        type: string
  push:
    branches: ["main"]
    paths:
      - "platform/**"
      - ".github/workflows/platform-deploy-railway-test.yml"

permissions:
  contents: read

concurrency:
  group: railway-production-deploy
  cancel-in-progress: false

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
  RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}

jobs:
  deploy-platform:
    name: Validate, Test, and Deploy Platform to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-railway-cli
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install platform dependencies
        run: mvn -f platform/pom.xml -DskipTests dependency:go-offline

      - name: Run platform tests
        run: mvn -f platform/pom.xml test -DfailIfNoTests=false

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Apply workflow dispatch overrides
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.railway_service }}" ]; then
            echo "RAILWAY_SERVICE=${{ github.event.inputs.railway_service }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ github.event.inputs.railway_environment }}" ]; then
            echo "RAILWAY_ENVIRONMENT=${{ github.event.inputs.railway_environment }}" >> "$GITHUB_ENV"
          fi

      - name: Log Current Environment Context
        run: |
          set -euo pipefail
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "RUNNER_OS=$RUNNER_OS"

          if [ -n "${RAILWAY_PROJECT_ID:-}" ]; then echo "RAILWAY_PROJECT_ID is set"; else echo "RAILWAY_PROJECT_ID is not set"; fi
          if [ -n "${RAILWAY_SERVICE:-}" ]; then echo "RAILWAY_SERVICE is set"; else echo "RAILWAY_SERVICE is not set"; fi
          if [ -n "${RAILWAY_ENVIRONMENT:-}" ]; then echo "RAILWAY_ENVIRONMENT is set"; else echo "RAILWAY_ENVIRONMENT is not set"; fi
          if [ -n "${RAILWAY_TOKEN:-}" ]; then echo "RAILWAY_TOKEN is set"; else echo "RAILWAY_TOKEN is not set"; fi

      - name: Validate Railway Token
        run: |
          set -euo pipefail
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN is empty"
            echo "Expected source: repository secret named RAILWAY_TOKEN"
            echo "Common causes:"
            echo "- Secret exists only in an Environment, but this workflow uses repository-level secret scope"
            echo "- Secret was added as a Variable instead of a Secret"
            echo "- Workflow run does not have access to secrets (for example, forked PR contexts)"
            echo "- Organization secret policy does not grant access to this repository"
            exit 1
          else
            echo "RAILWAY_TOKEN exists"
          fi

      - name: Validate Variables
        run: |
          set -euo pipefail
          if [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_SERVICE" ] || [ -z "$RAILWAY_ENVIRONMENT" ]; then
            echo "One or more required Railway variables are missing"
            echo "Set repository variables: RAILWAY_PROJECT_ID, RAILWAY_SERVICE, RAILWAY_ENVIRONMENT"
            exit 1
          fi
          echo "PROJECT=$RAILWAY_PROJECT_ID"
          echo "SERVICE=$RAILWAY_SERVICE"
          echo "ENVIRONMENT=$RAILWAY_ENVIRONMENT"

      - name: Mask Railway identifiers in logs
        run: |
          echo "::add-mask::$RAILWAY_PROJECT_ID"
          echo "::add-mask::$RAILWAY_SERVICE"
          echo "::add-mask::$RAILWAY_ENVIRONMENT"

      - name: Verify Railway Authentication
        run: railway whoami

      - name: Link Railway Project
        working-directory: platform
        run: railway link $RAILWAY_PROJECT_ID

      - name: Select Railway Environment
        working-directory: platform
        run: railway environment $RAILWAY_ENVIRONMENT

      - name: Deploy to Railway
        working-directory: platform
        run: railway up --service=$RAILWAY_SERVICE
