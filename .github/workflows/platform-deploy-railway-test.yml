name: Platform Deploy (Railway Test)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "platform/**"
      - ".github/workflows/platform-deploy-railway-test.yml"

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run platform tests
        run: mvn -f platform/pom.xml test -DfailIfNoTests=false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN || vars.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE || vars.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || vars.RAILWAY_ENVIRONMENT }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID || vars.RAILWAY_PROJECT_ID }}
        run: |
          missing=0

          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing RAILWAY_TOKEN"
            missing=1
          fi
          if [ -z "$RAILWAY_SERVICE" ]; then
            echo "Missing RAILWAY_SERVICE"
            missing=1
          fi
          if [ -z "$RAILWAY_ENVIRONMENT" ]; then
            echo "Missing RAILWAY_ENVIRONMENT"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "Configure the missing values in GitHub Actions Environment: test"
            exit 1
          fi

          service_lc="${RAILWAY_SERVICE,,}"
          if [ "$service_lc" = "postgres" ] || [ "$service_lc" = "postgresql" ]; then
            echo "Invalid RAILWAY_SERVICE: '$RAILWAY_SERVICE'"
            echo "Use the Railway APP service name (backend), not the database service."
            exit 1
          fi

          project_args=()
          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            project_args=(--project "$RAILWAY_PROJECT_ID")
          fi

          set +e
          deploy_output=$(railway up platform --service "$RAILWAY_SERVICE" --environment "$RAILWAY_ENVIRONMENT" "${project_args[@]}" --detach 2>&1)
          deploy_exit=$?
          set -e

          if [ "$deploy_exit" -ne 0 ]; then
            echo "$deploy_output"
            if echo "$deploy_output" | grep -qi "Unauthorized"; then
              echo "Railway authorization failed."
              echo "Verify RAILWAY_TOKEN is valid and has access to project '$RAILWAY_PROJECT_ID'."
              echo "If needed, regenerate token in the same Railway account/team that owns the target project."
            elif echo "$deploy_output" | grep -qi "Service not found"; then
              echo "Railway deploy failed: service not found."
              echo "Verify RAILWAY_SERVICE matches the exact app service name in the selected Railway project/environment."
              echo "If CI is not linked to the intended Railway project, set RAILWAY_PROJECT_ID in GitHub Environment: test."
            else
              echo "Railway deploy failed."
              echo "Verify RAILWAY_SERVICE, RAILWAY_ENVIRONMENT, and optional RAILWAY_PROJECT_ID values."
            fi
            echo "Current values: service='$RAILWAY_SERVICE', environment='$RAILWAY_ENVIRONMENT'."
            exit "$deploy_exit"
          fi
