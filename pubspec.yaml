name: maisum
description: MaisUm — offline-first loyalty for small businesses
publish_to: none
version: 1.0.5+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  hooks_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Database
  sqflite: ^2.3.3
  path: ^1.9.1

  # Code generation models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Connectivity
  connectivity_plus: ^6.1.4

  # Background work
  workmanager: ^0.9.0+3

  crypto: ^3.0.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  pinput: ^5.0.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  sqflite_common_ffi: ^2.3.0
  sqlite3: ">=2.3.2 <3.0.0"
  firebase_auth_mocks: ^0.14.1
  fake_cloud_firestore: ^3.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
