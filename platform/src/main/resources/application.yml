server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loyaltyos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

platform:
  cache:
    snapshotTtlSeconds: 30
  admin:
    apiKey: ${ADMIN_API_KEY:}
  jobs:
    appointmentReminderCron: ${APPOINTMENT_REMINDER_CRON:0 0 8 * * *}
    retentionMetricsCron: ${RETENTION_METRICS_CRON:0 20 1 * * *}
