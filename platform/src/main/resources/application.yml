server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:loyaltyos-fc4dd-service}:${DB_PORT:5432}/${DB_NAME:maisum}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

platform:
  cache:
    snapshotTtlSeconds: 30
  admin:
    apiKey: ${ADMIN_API_KEY:}
  jobs:
    appointmentReminderCron: ${APPOINTMENT_REMINDER_CRON:0 0 8 * * *}
    retentionMetricsCron: ${RETENTION_METRICS_CRON:0 20 1 * * *}
